name: Entrenador Poisson España

on:
  schedule:
    - cron: '0 */12 * * *' 
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install requests pandas

      - name: Run Trainer
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python trainer.py

      - name: Push Changes
        env:
          # Usamos el token personalizado para asegurar el permiso de push
          GITHUB_TOKEN: ${{ secrets.BOT_REPO_TOKEN }} 
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add modelo_poisson.json
          git commit -m "Update Spain Poisson Data" || exit 0
          git push origin HEAD:main
