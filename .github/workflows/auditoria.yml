name: Auditoria de Pronosticos

on:
  schedule:
    # Se ejecuta todos los días a las 04:00 UTC (cuando los partidos del día anterior han terminado)
    - cron: '0 4 * * *'
  workflow_dispatch: # Permite ejecución manual

permissions:
  contents: write

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install requests python-dotenv

      - name: Ejecutar Verificador
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python verificador.py
